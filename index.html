<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conference Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lora:ital,wght@0,400;1,400&family=Share+Tech+Mono&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lora', Georgia, serif; background: transparent; padding: 0.9rem; }

  .card { background: #fdf8f2; border-radius: 14px; padding: 1.1rem 1.25rem; position: relative; overflow: hidden; }
  .watercolor-tl { position: absolute; top: -35px; left: -25px; width: 180px; height: 160px; border-radius: 50%; background: radial-gradient(circle, rgba(180,200,220,0.18), rgba(210,190,215,0.12), transparent 70%); pointer-events: none; }
  .watercolor-br { position: absolute; bottom: -35px; right: -25px; width: 170px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(210,185,155,0.16), rgba(195,210,190,0.10), transparent 70%); pointer-events: none; }

  .header { font-family: 'Playfair Display', Georgia, serif; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #9a8c7e; margin-bottom: 0.6rem; position: relative; }
  .border-line { height: 2px; background: linear-gradient(to right, transparent, #c8b8a8 20%, #b8c4c0 50%, #c4b0bc 80%, transparent); border-radius: 999px; margin-bottom: 0.9rem; }

  .conference-name { font-family: 'Playfair Display', Georgia, serif; font-size: 15px; font-weight: 500; color: #5c4f3d; margin-bottom: 2px; line-height: 1.3; position: relative; }
  .conference-meta { font-size: 11px; font-style: italic; color: #a8977f; margin-bottom: 1rem; position: relative; }

  /* Split flap display */
  .flap-board {
    display: flex; justify-content: center; gap: 6px;
    margin-bottom: 1rem; position: relative;
  }

  .flap-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .flap-tile {
    width: 52px; height: 58px;
    background: #2c2520;
    border-radius: 5px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(44,37,32,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .flap-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: #f0e8d8;
    line-height: 1;
    letter-spacing: -1px;
  }

  /* Screw details */
  .flap-screw-tl, .flap-screw-tr {
    position: absolute; width: 5px; height: 5px;
    border-radius: 50%; background: #1a1410;
    border: 0.5px solid #3a3028; z-index: 3;
  }
  .flap-screw-tl { top: 3px; left: 3px; }
  .flap-screw-tr { top: 3px; right: 3px; }

  .flap-label {
    font-family: 'Lora', Georgia, serif;
    font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; color: #a8977f;
    font-style: italic;
  }

  .flap-separator {
    display: flex; flex-direction: column;
    justify-content: center; gap: 8px;
    padding-bottom: 18px;
  }

  .flap-sep-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #5c4f3d; opacity: 0.5;
  }

  .next-section { margin-top: 0.75rem; position: relative; }
  .next-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: #b8a898; margin-bottom: 4px; }
  .next-item { font-size: 11px; font-style: italic; color: #9a8c7e; padding: 4px 8px; background: rgba(255,255,255,0.5); border-radius: 6px; border-left: 1.5px solid #d4c4b0; margin-bottom: 4px; }

  .none-msg { font-size: 12px; font-style: italic; color: #a8977f; text-align: center; padding: 1rem 0; position: relative; }

  .status-bar { display: flex; align-items: center; gap: 6px; margin-top: 0.6rem; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .status-text { font-size: 10px; color: #a8977f; font-style: italic; }
  .btn-row { display: flex; gap: 8px; margin-top: 0.5rem; }
  .btn { font-family: 'Lora', Georgia, serif; font-size: 11px; font-style: italic; padding: 4px 12px; cursor: pointer; border: 0.5px solid #d4c4b0; border-radius: 6px; background: rgba(255,255,255,0.7); color: #7a6a55; }
  .btn:hover { background: #f0e8dc; }
  .btn-danger { border-color: #d4b0b0; color: #9a5555; }
  .btn-danger:hover { background: #f5e8e8; }
  .updated { font-size: 10px; color: #b0a090; font-style: italic; margin-top: 0.3rem; }
  .error-box { background: #f8eded; border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 11px; color: #9a5555; font-style: italic; margin: 0.5rem 0; }

  .setup-title { font-family: 'Playfair Display', Georgia, serif; font-size: 15px; font-weight: 500; color: #5c4f3d; margin-bottom: 6px; }
  .setup-desc { font-size: 12px; color: #9a8c7e; margin-bottom: 0.75rem; line-height: 1.6; font-style: italic; }
  .setup-label { font-size: 11px; color: #7a6a55; font-weight: 500; margin-bottom: 4px; display: block; }
  .setup-input { width: 100%; padding: 7px 9px; font-size: 12px; border: 0.5px solid #d4c4b0; border-radius: 6px; font-family: monospace; color: #5c4f3d; background: rgba(255,255,255,0.8); margin-bottom: 0.6rem; }
  .setup-input:focus { outline: none; border-color: #b8c4b0; }
  .btn-primary { background: #7a6a55; color: #fdf8f2; border-color: #7a6a55; font-style: normal; }
  .btn-primary:hover { background: #6a5a47; }
</style>
</head>
<body>
<div class="card">
  <div class="watercolor-tl"></div>
  <div class="watercolor-br"></div>

  <div id="setup-view">
    <div class="setup-title">Connect Notion</div>
    <div class="setup-desc">Enter your Notion API token to pull your upcoming conferences.</div>
    <label class="setup-label">Notion API token</label>
    <input class="setup-input" type="password" id="token-input" placeholder="ntn_..." />
    <div id="setup-error"></div>
    <button class="btn btn-primary" onclick="saveToken()">connect</button>
  </div>

  <div id="stats-view" style="display:none;">
    <div class="header">Conference Countdown</div>
    <div class="border-line"></div>
    <div id="main-content"></div>
    <div id="status-area"></div>
    <div class="updated" id="updated-text"></div>
    <div class="btn-row">
      <button class="btn" onclick="fetchData()">refresh</button>
      <button class="btn btn-danger" onclick="resetToken()">reset token</button>
    </div>
  </div>
</div>

<script>
const PROXY = "https://notion-phd-proxy.ddragoljic99.workers.dev";
const DB_CONFERENCES = "34f8639df384807db46be575e1e1702d";
let countdownInterval = null;

function getToken() { return localStorage.getItem("notion_phd_token"); }

function saveToken() {
  const val = document.getElementById("token-input").value.trim();
  if (!val.startsWith("ntn_") && !val.startsWith("secret_")) {
    document.getElementById("setup-error").innerHTML = `<div class="error-box">that doesn't look like a valid token</div>`;
    return;
  }
  localStorage.setItem("notion_phd_token", val);
  showStats();
}

function resetToken() {
  localStorage.removeItem("notion_phd_token");
  if (countdownInterval) clearInterval(countdownInterval);
  document.getElementById("stats-view").style.display = "none";
  document.getElementById("setup-view").style.display = "block";
  document.getElementById("token-input").value = "";
}

function showStats() {
  document.getElementById("setup-view").style.display = "none";
  document.getElementById("stats-view").style.display = "block";
  fetchData();
}

function setStatus(msg, isError) {
  document.getElementById("status-area").innerHTML = isError
    ? `<div class="error-box">${msg}</div>`
    : `<div class="status-bar"><div class="status-dot" style="background:#b8c4c0"></div><span class="status-text">${msg}</span></div>`;
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
}

function makeFlapTile(value, label) {
  const padded = String(value).padStart(2, '0');
  return `
    <div class="flap-unit">
      <div class="flap-tile">
        <div class="flap-screw-tl"></div>
        <div class="flap-screw-tr"></div>
        <div class="flap-num">${padded}</div>
      </div>
      <div class="flap-label">${label}</div>
    </div>`;
}

function makeSeparator() {
  return `<div class="flap-separator"><div class="flap-sep-dot"></div><div class="flap-sep-dot"></div></div>`;
}

function updateFlaps(targetDate) {
  const now = new Date();
  const target = new Date(targetDate);
  target.setHours(23, 59, 59, 0);
  const diff = target - now;

  if (diff <= 0) {
    document.getElementById("flap-board")?.remove();
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);

  const board = document.getElementById("flap-board");
  if (board) {
    board.innerHTML =
      makeFlapTile(days, "days") +
      makeSeparator() +
      makeFlapTile(hours, "hrs") +
      makeSeparator() +
      makeFlapTile(mins, "min") +
      makeSeparator() +
      makeFlapTile(secs, "sec");
  }
}

function renderCountdown(conf, nextConfs) {
  let html = `
    <div class="conference-name">${conf.name}</div>
    <div class="conference-meta">${formatDate(conf.date)}${conf.location ? ' · ' + conf.location : ''}</div>
    <div class="flap-board" id="flap-board"></div>`;

  if (nextConfs && nextConfs.length > 0) {
    html += `<div class="next-section"><div class="next-label">also coming up</div>`;
    nextConfs.forEach(n => {
      const d = daysUntil(n.date);
      html += `<div class="next-item">${n.name} — in ${d} days</div>`;
    });
    html += `</div>`;
  }

  document.getElementById("main-content").innerHTML = html;

  if (countdownInterval) clearInterval(countdownInterval);
  updateFlaps(conf.date);
  countdownInterval = setInterval(() => updateFlaps(conf.date), 1000);
}

async function fetchData() {
  setStatus("fetching from Notion...");
  document.getElementById("main-content").innerHTML = '';
  if (countdownInterval) clearInterval(countdownInterval);

  try {
    const TOKEN = getToken();
    const today = new Date().toISOString().split('T')[0];

    const res = await fetch(`${PROXY}/proxy/v1/databases/${DB_CONFERENCES}/query`, {
      method: "POST",
      headers: { "Authorization": `Bearer ${TOKEN}`, "Notion-Version": "2022-06-28", "Content-Type": "application/json" },
      body: JSON.stringify({
        page_size: 100,
        filter: {
          and: [
            { property: "dates", date: { on_or_after: today } },
            { property: "status", status: { does_not_equal: "attended" } }
          ]
        },

      })
    });

    const data = await res.json();
    if (data.object === "error") throw new Error(data.message);

    const results = data.results;
    if (!results || results.length === 0) {
      document.getElementById("main-content").innerHTML = `<div class="none-msg">no upcoming conferences yet — go find one! 🌿</div>`;
      setStatus("live from your Notion databases");
      return;
    }

    const upcoming = results.map(r => {
      const props = r.properties;
      const nameArr = props["conference name"]?.title || [];
      const name = nameArr.map(t => t.plain_text).join('') || 'Untitled';
      const dateVal = props["dates"]?.date?.start || null;
      const location = props["Location"]?.rich_text?.map(t => t.plain_text).join('') || '';
      return { name, date: dateVal, location };
    }).filter(c => c.date && daysUntil(c.date) >= 0).sort((a, b) => new Date(a.date) - new Date(b.date));

    if (upcoming.length === 0) {
      document.getElementById("main-content").innerHTML = `<div class="none-msg">no upcoming conferences yet — go find one! 🌿</div>`;
      setStatus("live from your Notion databases");
      return;
    }

    const next = upcoming[0];
    const rest = upcoming.slice(1, 3);
    renderCountdown(next, rest);
    setStatus("live from your Notion databases");
    document.getElementById("updated-text").textContent = `last updated: ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    setStatus(`could not connect to Notion — ${err.message}`, true);
  }
}

if (getToken()) { showStats(); }
setInterval(() => { if (getToken()) { fetchData(); } }, 60000);
</script>
</body>
</html>
